<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match 'em</title>
<style>
  :root{
    --bg:#1c1a22;
    --surface:#262330;
    --surface-2:#2e2a3a;
    --paper:#f4ecdd;
    --paper-dim:#e7ddc9;
    --ink:#2a2430;
    --flame:#ff7a3c;
    --flame-2:#ffb03a;
    --text:#efeaf2;
    --muted:#9a93a8;
    --g-yellow:#e9c44d;
    --g-green:#8fb45c;
    --g-blue:#6f9fd8;
    --g-purple:#a87fd4;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #2b2536 0%, var(--bg) 60%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
    padding:18px 12px 40px;
  }
  /* ---------- header ---------- */
  header{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:14px}
  .logo{
    font-size:clamp(30px,8vw,44px);
    font-weight:900;letter-spacing:.06em;
    display:flex;align-items:baseline;
    text-transform:uppercase;
    color:var(--text);
  }
  .logo .em{color:var(--flame)}
  .logo .matchmark{
    display:inline-block;width:.34em;height:.86em;position:relative;margin:0 .06em;
    transform:translateY(-.08em);
  }
  .logo .matchmark .stick{
    position:absolute;left:42%;bottom:0;width:16%;height:62%;
    background:var(--paper);border-radius:2px;transform:rotate(6deg);
  }
  .logo .matchmark .flame{
    position:absolute;left:30%;bottom:54%;width:44%;height:46%;
    background:radial-gradient(circle at 50% 85%, var(--flame-2) 0%, var(--flame) 55%, transparent 75%);
    border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    animation:flicker 1.1s infinite alternate ease-in-out;
    transform-origin:50% 100%;
  }
  @keyframes flicker{
    0%{transform:scale(1) rotate(-3deg)}
    50%{transform:scale(1.12,1.22) rotate(2deg)}
    100%{transform:scale(.94,1.05) rotate(-2deg)}
  }
  .tagline{color:var(--muted);font-size:13px;letter-spacing:.04em}
  .daybadge{
    margin-top:6px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--flame-2);background:rgba(255,122,60,.1);
    border:1px solid rgba(255,122,60,.35);
    padding:4px 12px;border-radius:999px;
  }
  /* ---------- board ---------- */
  .wrap{width:100%;max-width:520px}
  .instructions{color:var(--muted);text-align:center;font-size:14px;margin:6px 0 14px}
  #solvedArea{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
  .solved-banner{
    border-radius:var(--radius);padding:12px 10px;text-align:center;color:#241f12;
    animation:pop .45s cubic-bezier(.2,1.4,.4,1);
  }
  .solved-banner h3{font-size:14px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
  .solved-banner p{font-size:13px;font-weight:600;margin-top:2px;letter-spacing:.02em}
  @keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
  #grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  }
  .tile{
    background:var(--paper);color:var(--ink);
    border:none;border-radius:var(--radius);
    min-height:72px;padding:6px 4px;
    font-weight:800;letter-spacing:.02em;text-transform:uppercase;
    font-size:15px;cursor:pointer;user-select:none;
    box-shadow:0 2px 0 rgba(0,0,0,.35);
    transition:transform .12s ease, background .12s ease, color .12s ease;
    word-break:break-word;line-height:1.1;
    font-family:inherit;
  }
  .tile.len8{font-size:13px}
  .tile.len10{font-size:11px;letter-spacing:0}
  .tile:active{transform:scale(.96)}
  .tile.selected{
    background:var(--ink);color:var(--paper);
    outline:2px solid var(--flame);outline-offset:-2px;
    transform:scale(.97);
  }
  .tile.shake{animation:shake .4s}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}
  }
  .tile.bounce{animation:bounce .35s}
  @keyframes bounce{0%{transform:translateY(0)}40%{transform:translateY(-8px)}100%{transform:translateY(0)}}
  /* ---------- lives ---------- */
  .lives{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 4px}
  .lives-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:700}
  .match{width:18px;height:46px;position:relative;transition:opacity .4s}
  .match .stick{position:absolute;left:7px;bottom:0;width:4px;height:32px;background:var(--paper);border-radius:2px}
  .match .head{position:absolute;left:4px;bottom:28px;width:10px;height:13px;background:linear-gradient(var(--flame-2),var(--flame));border-radius:50% 50% 45% 45%}
  .match.burnt .stick{background:#564f63}
  .match.burnt .head{background:#3a3544;transform:scaleY(.8)}
  .match.burning .head{animation:burnout .8s forwards}
  @keyframes burnout{
    0%{filter:brightness(1.6);transform:scale(1.3)}
    100%{filter:brightness(.4);transform:scaleY(.8)}
  }
  /* ---------- controls ---------- */
  .controls{display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .btn{
    font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.04em;
    padding:12px 22px;border-radius:999px;cursor:pointer;
    border:1.5px solid var(--muted);background:transparent;color:var(--text);
    transition:all .15s;
  }
  .btn:disabled{opacity:.35;cursor:default}
  .btn-primary{
    background:linear-gradient(135deg,var(--flame-2),var(--flame));
    border-color:transparent;color:#2a1408;
  }
  .btn-primary:not(:disabled):active{transform:scale(.96)}
  /* ---------- toast ---------- */
  #toast{
    position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);
    background:var(--paper);color:var(--ink);font-weight:800;font-size:14px;
    padding:10px 20px;border-radius:999px;box-shadow:0 6px 24px rgba(0,0,0,.5);
    transition:transform .3s cubic-bezier(.2,1.2,.4,1);z-index:50;pointer-events:none;
    max-width:90vw;text-align:center;
  }
  #toast.show{transform:translateX(-50%) translateY(0)}
  /* ---------- end panel ---------- */
  #endPanel{
    display:none;width:100%;max-width:520px;margin-top:10px;
    background:var(--surface);border:1px solid #3a3448;border-radius:18px;
    padding:24px 20px;text-align:center;
    animation:pop .5s cubic-bezier(.2,1.3,.4,1);
  }
  #endPanel h2{font-size:24px;font-weight:900;letter-spacing:.04em;margin-bottom:6px}
  #endPanel .sub{color:var(--muted);font-size:14px;margin-bottom:16px}
  .emoji-grid{font-size:22px;line-height:1.35;margin:10px 0 16px;letter-spacing:2px}
  .stats-row{display:flex;justify-content:center;gap:26px;margin:14px 0 18px}
  .stat{display:flex;flex-direction:column;align-items:center}
  .stat b{font-size:26px;color:var(--flame-2)}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
  .countdown-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:700}
  #countdown{font-size:34px;font-weight:900;letter-spacing:.06em;color:var(--text);font-variant-numeric:tabular-nums;margin-top:4px}
  .copy-btn{margin-top:16px}
  footer{margin-top:auto;padding-top:26px;color:#5e5870;font-size:12px}
  @media (max-width:380px){
    .tile{min-height:64px;font-size:13px}
    .tile.len8{font-size:11px}
    .tile.len10{font-size:10px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">MATCH<span class="matchmark"><span class="stick"></span><span class="flame"></span></span><span class="em">EM</span></div>
  <div class="tagline">Find four groups of four. Don't burn out.</div>
  <div class="daybadge" id="dayBadge">Puzzle #1</div>
</header>

<div class="wrap">
  <p class="instructions" id="instructions">Tap four tiles that share a connection, then strike a match.</p>
  <div id="solvedArea"></div>
  <div id="grid"></div>

  <div class="lives" id="livesRow">
    <span class="lives-label">Matches</span>
    <div class="match" id="m0"><div class="stick"></div><div class="head"></div></div>
    <div class="match" id="m1"><div class="stick"></div><div class="head"></div></div>
    <div class="match" id="m2"><div class="stick"></div><div class="head"></div></div>
  </div>

  <div class="controls" id="controls">
    <button class="btn" id="shuffleBtn">Shuffle</button>
    <button class="btn" id="deselectBtn" disabled>Deselect</button>
    <button class="btn btn-primary" id="submitBtn" disabled>Match 'em</button>
  </div>

  <div id="endPanel">
    <h2 id="endTitle"></h2>
    <p class="sub" id="endSub"></p>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="stats-row">
      <div class="stat"><b id="statPlayed">0</b><span>Played</span></div>
      <div class="stat"><b id="statWins">0</b><span>Wins</span></div>
      <div class="stat"><b id="statStreak">0</b><span>Streak</span></div>
    </div>
    <div class="countdown-label">Next puzzle in</div>
    <div id="countdown">--:--:--</div>
    <button class="btn copy-btn" id="copyBtn">Copy result</button>
  </div>
</div>

<div id="toast"></div>
<footer>Match 'em — a daily grouping game</footer>

const COLORS = ["var(--g-yellow)","var(--g-green)","var(--g-blue)","var(--g-purple)"];
const EMOJI  = ["🟨","🟩","🟦","🟪"];
const EPOCH  = new Date(2026,5,12); // 12 June 2026 = Puzzle #1

/* ============ STORAGE (with in-memory fallback) ============ */
const memStore = {};
const hasStorage = typeof window.storage !== "undefined";
async function sGet(key){
  if(hasStorage){ try{ const r = await window.storage.get(key); return r ? r.value : null; }catch(e){ return null; } }
  return memStore[key] ?? null;
}
async function sSet(key,val){
  if(hasStorage){ try{ await window.storage.set(key,val); return; }catch(e){} }
  memStore[key]=val;
}

/* ============ DATE / DAY INDEX ============ */
function todayKey(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function dayNumber(){
  const now=new Date(); const t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const e0=new Date(EPOCH.getFullYear(),EPOCH.getMonth(),EPOCH.getDate());
  const diff=Math.round((t0-e0)/86400000);
  return ((diff%30)+30)%30; // 0..29, loops forever
}

/* ============ GAME STATE ============ */
const DAY = dayNumber();
const DATE = todayKey();
const puzzle = PUZZLES[DAY];
const KEY_RESULT = "matchem-result-"+DATE;
const KEY_PROG   = "matchem-progress-"+DATE;
const KEY_STATS  = "matchem-stats";

let lives=3, selected=[], solved=[], guesses=[], board=[], finished=false;

const grid=document.getElementById("grid");
const solvedArea=document.getElementById("solvedArea");
const submitBtn=document.getElementById("submitBtn");
const deselectBtn=document.getElementById("deselectBtn");
const shuffleBtn=document.getElementById("shuffleBtn");

document.getElementById("dayBadge").textContent="Puzzle #"+(DAY+1)+" · "+new Date().toLocaleDateString(undefined,{day:"numeric",month:"short"});

function wordGroup(word){ return puzzle.findIndex(g=>g.w.includes(word)); }

function buildBoard(){
  board=[];
  puzzle.forEach(g=>{ if(!solved.includes(puzzle.indexOf(g))) board.push(...g.w); });
  // remove words from solved groups
  board = board.filter(w=>!solved.includes(wordGroup(w)));
  shuffleArr(board);
}
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} }

function renderBoard(){
  grid.innerHTML="";
  board.forEach(w=>{
    const b=document.createElement("button");
    b.className="tile"+(w.length>=11?" len10":w.length>=8?" len8":"");
    b.textContent=w;
    if(selected.includes(w)) b.classList.add("selected");
    b.onclick=()=>toggle(w,b);
    grid.appendChild(b);
  });
  submitBtn.disabled = selected.length!==4 || finished;
  deselectBtn.disabled = selected.length===0 || finished;
  shuffleBtn.disabled = finished;
}
function renderSolved(){
  solvedArea.innerHTML="";
  solved.forEach(gi=>{
    const g=puzzle[gi];
    const d=document.createElement("div");
    d.className="solved-banner";
    d.style.background=COLORS[gi];
    d.innerHTML="<h3>"+g.t+"</h3><p>"+g.w.join(", ")+"</p>";
    solvedArea.appendChild(d);
  });
}
function renderLives(){
  for(let i=0;i<3;i++){
    document.getElementById("m"+i).classList.toggle("burnt", i>=lives);
  }
}

function toggle(w,el){
  if(finished) return;
  const i=selected.indexOf(w);
  if(i>-1){ selected.splice(i,1); el.classList.remove("selected"); }
  else if(selected.length<4){ selected.push(w); el.classList.add("selected"); el.classList.add("bounce"); setTimeout(()=>el.classList.remove("bounce"),350); }
  submitBtn.disabled = selected.length!==4;
  deselectBtn.disabled = selected.length===0;
}

deselectBtn.onclick=()=>{ selected=[]; renderBoard(); };
shuffleBtn.onclick=()=>{ shuffleArr(board); renderBoard(); };

submitBtn.onclick=async ()=>{
  if(selected.length!==4||finished) return;
  const groupsHit = selected.map(wordGroup);
  const sortedSel=[...selected].sort().join("|");
  if(guesses.some(g=>g.words===sortedSel)){ toast("Already tried that one"); return; }
  guesses.push({words:sortedSel, groups:[...groupsHit]});

  const counts={};
  groupsHit.forEach(g=>counts[g]=(counts[g]||0)+1);
  const best=Math.max(...Object.values(counts));

  if(best===4){
    const gi=groupsHit[0];
    solved.push(gi);
    selected=[];
    buildBoard(); renderSolved(); renderBoard();
    if(solved.length===4){ await finish(true); }
    else toast(["Lovely!","Struck it!","On fire! 🔥","Matched!"][Math.floor(Math.random()*4)]);
  }else{
    lives--;
    const m=document.getElementById("m"+lives);
    m.classList.add("burning");
    setTimeout(()=>{ m.classList.remove("burning"); renderLives(); },800);
    document.querySelectorAll(".tile.selected").forEach(t=>t.classList.add("shake"));
    setTimeout(()=>document.querySelectorAll(".tile").forEach(t=>t.classList.remove("shake")),450);
    toast(best===3 ? "So close — one away!" : "Not a match");
    if(lives===0){ await revealAll(); await finish(false); return; }
  }
  await saveProgress();
};

async function revealAll(){
  finished=true;
  for(let gi=0;gi<4;gi++){
    if(!solved.includes(gi)){ solved.push(gi); }
  }
  buildBoard(); renderSolved(); renderBoard();
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1800);
}

/* ============ PERSISTENCE ============ */
async function saveProgress(){
  await sSet(KEY_PROG, JSON.stringify({lives,solved,guesses}));
}
async function finish(won){
  finished=true;
  selected=[];
  renderBoard();
  const stats=await loadStats();
  stats.played++;
  if(won){
    stats.wins++;
    stats.streak = (stats.lastWin && isYesterday(stats.lastWin)) ? stats.streak+1 : 1;
    stats.lastWin=DATE;
  }else{
    stats.streak=0;
  }
  await sSet(KEY_STATS, JSON.stringify(stats));
  await sSet(KEY_RESULT, JSON.stringify({won,lives,guesses,date:DATE,day:DAY}));
  showEnd(won, stats);
}
function isYesterday(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const y=new Date(); y.setDate(y.getDate()-1);
  return d.getFullYear()===y.getFullYear()&&d.getMonth()===y.getMonth()&&d.getDate()===y.getDate();
}
async function loadStats(){
  const raw=await sGet(KEY_STATS);
  try{ return raw?JSON.parse(raw):{played:0,wins:0,streak:0,lastWin:null}; }
  catch(e){ return {played:0,wins:0,streak:0,lastWin:null}; }
}

/* ============ END SCREEN ============ */
function emojiGridText(){
  return guesses.map(g=>g.groups.map(i=>EMOJI[i]).join("")).join("\n");
}
function showEnd(won, stats){
  document.getElementById("controls").style.display="none";
  document.getElementById("livesRow").style.display="none";
  document.getElementById("instructions").style.display="none";
  const p=document.getElementById("endPanel");
  p.style.display="block";
  document.getElementById("endTitle").textContent = won
    ? ["Perfect strike! 🔥","Blazing! 🔥","Matched 'em all!"][3-Math.min(lives,2)-1] || "Matched 'em all!"
    : "Burnt out 💨";
  document.getElementById("endSub").textContent = won
    ? "Puzzle #"+(DAY+1)+" solved with "+lives+(lives===1?" match":" matches")+" to spare."
    : "Puzzle #"+(DAY+1)+" got away — the groups are revealed above.";
  document.getElementById("emojiGrid").innerHTML = emojiGridText().replace(/\n/g,"<br>");
  document.getElementById("statPlayed").textContent=stats.played;
  document.getElementById("statWins").textContent=stats.wins;
  document.getElementById("statStreak").textContent=stats.streak;
  startCountdown();
}
function startCountdown(){
  const el=document.getElementById("countdown");
  function tick(){
    const now=new Date();
    const mid=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
    let s=Math.max(0,Math.floor((mid-now)/1000));
    const h=String(Math.floor(s/3600)).padStart(2,"0");
    const m=String(Math.floor(s%3600/60)).padStart(2,"0");
    const sec=String(s%60).padStart(2,"0");
    el.textContent=h+":"+m+":"+sec;
    if(s===0) location.reload();
  }
  tick(); setInterval(tick,1000);
}
document.getElementById("copyBtn").onclick=()=>{
  const txt="Match 'em — Puzzle #"+(DAY+1)+"\n"+emojiGridText();
  const ta=document.createElement("textarea");
  ta.value=txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("Copied!"); }catch(e){ toast("Couldn't copy"); }
  document.body.removeChild(ta);
};

/* ============ INIT ============ */
(async function init(){
  const doneRaw=await sGet(KEY_RESULT);
  if(doneRaw){
    try{
      const r=JSON.parse(doneRaw);
      lives=r.lives; guesses=r.guesses||[]; finished=true;
      solved=[0,1,2,3];
      buildBoard(); renderSolved(); renderBoard(); renderLives();
      const stats=await loadStats();
      showEnd(r.won, stats);
      document.getElementById("endSub").textContent = (r.won?"You solved":"You played")+" today's puzzle. Come back tomorrow!";
      return;
    }catch(e){}
  }
  const progRaw=await sGet(KEY_PROG);
  if(progRaw){
    try{
      const p=JSON.parse(progRaw);
      lives=p.lives??3; solved=p.solved||[]; guesses=p.guesses||[];
    }catch(e){}
  }
  buildBoard(); renderSolved(); renderBoard(); renderLives();
})();
</script>
