<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shroud</title>
<style>
  :root{
    --bg:#0c0b16;
    --surface:#13112a;
    --surface-2:#1c1938;
    --border:#2b2750;
    --accent:#b197fc;
    --accent-dim:#7c3aed;
    --text:#ede8ff;
    --muted:#7a7494;
    --green:#4ade80;
    --red:#f87171;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(1000px 500px at 50% -8%, #1e1445 0%, var(--bg) 65%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    min-height:100%;
    padding:18px 14px 40px;
  }

  /* ---- header ---- */
  header{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:20px}
  .logo{
    font-size:clamp(38px,11vw,56px);
    font-weight:900;letter-spacing:.22em;text-transform:uppercase;
    background:linear-gradient(135deg,#ddd4ff 0%,var(--accent) 50%,var(--accent-dim) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 22px rgba(167,139,250,.4));
  }
  .tagline{color:var(--muted);font-size:13px;letter-spacing:.04em;text-align:center}
  .daybadge{
    margin-top:6px;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--accent);background:rgba(167,139,250,.1);
    border:1px solid rgba(167,139,250,.28);
    padding:4px 13px;border-radius:999px;
  }

  /* ---- layout ---- */
  .wrap{width:100%;max-width:520px}

  /* ---- meta bar ---- */
  .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .category-pill{
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
    color:var(--muted);background:var(--surface);
    border:1px solid var(--border);padding:5px 13px;border-radius:999px;
  }
  .gems{display:flex;gap:7px;align-items:center}
  .gem{
    width:13px;height:13px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 9px rgba(177,151,252,.7);
    transition:background .4s, box-shadow .4s;
  }
  .gem.spent{background:var(--surface-2);box-shadow:none;border:1px solid var(--border)}

  /* ---- clues ---- */
  #cluesList{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
  .clue-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:13px 16px;display:flex;align-items:flex-start;gap:12px;
    animation:slideIn .38s cubic-bezier(.2,1.1,.4,1);
  }
  @keyframes slideIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
  .clue-num{
    min-width:24px;height:24px;border-radius:50%;
    background:var(--accent-dim);color:#fff;
    font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;margin-top:1px;
  }
  .clue-text{font-size:15px;line-height:1.55;color:var(--text)}
  .clue-pending{
    background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);
    padding:13px 16px;display:flex;align-items:center;gap:12px;opacity:.35;
  }
  .clue-pending .clue-num{background:var(--surface-2);color:var(--muted)}
  .dot-bar{height:8px;border-radius:4px;background:var(--surface-2);width:55%}

  /* ---- feedback ---- */
  .feedback{
    text-align:center;font-size:14px;font-weight:700;
    min-height:22px;margin:4px 0 10px;letter-spacing:.02em;
  }
  .feedback.good{color:var(--green)}
  .feedback.bad{color:var(--red)}

  /* ---- guess area ---- */
  .guess-row{display:flex;gap:8px;margin-bottom:9px}
  #guessInput{
    flex:1;background:var(--surface);border:1.5px solid var(--border);
    color:var(--text);font-size:15px;font-weight:600;
    padding:13px 16px;border-radius:var(--radius);font-family:inherit;
    letter-spacing:.03em;outline:none;transition:border-color .2s;
  }
  #guessInput:focus{border-color:var(--accent)}
  #guessInput::placeholder{color:var(--muted);font-weight:400}
  #guessInput.flash-wrong{border-color:var(--red);animation:shake .35s}
  #guessInput.flash-right{border-color:var(--green)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  .sub-row{display:flex;gap:8px}
  .btn{
    font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.04em;
    padding:12px 20px;border-radius:var(--radius);cursor:pointer;
    border:1.5px solid var(--border);background:transparent;color:var(--text);
    transition:all .14s;white-space:nowrap;flex:1;
  }
  .btn:disabled{opacity:.28;cursor:default}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent-dim));
    border-color:transparent;color:#fff;flex:unset;padding:12px 22px;
  }
  .btn-primary:not(:disabled):active{transform:scale(.97)}

  /* ---- toast ---- */
  #toast{
    position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);
    background:var(--text);color:#12102a;font-weight:800;font-size:14px;
    padding:10px 22px;border-radius:999px;box-shadow:0 6px 24px rgba(0,0,0,.55);
    transition:transform .3s cubic-bezier(.2,1.2,.4,1);z-index:50;pointer-events:none;
    max-width:90vw;text-align:center;
  }
  #toast.show{transform:translateX(-50%) translateY(0)}

  /* ---- end panel ---- */
  #endPanel{
    display:none;width:100%;max-width:520px;margin-top:8px;
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:28px 22px;text-align:center;
    animation:popIn .48s cubic-bezier(.2,1.3,.4,1);
  }
  @keyframes popIn{from{transform:scale(.84);opacity:0}to{transform:scale(1);opacity:1}}
  #endPanel h2{font-size:26px;font-weight:900;letter-spacing:.03em;margin-bottom:7px}
  .answer-reveal{
    font-size:21px;font-weight:800;letter-spacing:.07em;color:var(--accent);
    text-transform:uppercase;margin:8px 0 4px;
  }
  #endSub{color:var(--muted);font-size:14px;margin-bottom:14px;line-height:1.5}
  .score-big{font-size:52px;margin:10px 0 4px;filter:drop-shadow(0 0 14px rgba(177,151,252,.35))}
  .score-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:700}
  .stats-row{display:flex;justify-content:center;gap:30px;margin:18px 0}
  .stat{display:flex;flex-direction:column;align-items:center}
  .stat b{font-size:28px;font-weight:900;color:var(--accent)}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
  .cdown-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  #countdown{font-size:36px;font-weight:900;letter-spacing:.06em;font-variant-numeric:tabular-nums;margin-top:4px}
  .end-btns{display:flex;justify-content:center;gap:8px;margin-top:18px;flex-wrap:wrap}
  .end-btns .btn{flex:unset;font-size:13px;padding:10px 18px}

  footer{margin-top:auto;padding-top:28px;color:#37334f;font-size:12px}

  @media(max-width:380px){
    .clue-text{font-size:14px}
    .logo{letter-spacing:.14em}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Shroud</div>
  <div class="tagline">Five clues. One answer. Lift the shroud.</div>
  <div class="daybadge" id="dayBadge">Mystery #1</div>
</header>

<div class="wrap" id="mainWrap">
  <div class="meta">
    <div class="category-pill" id="catLabel">—</div>
    <div class="gems" id="gems"></div>
  </div>

  <div id="cluesList"></div>

  <div class="feedback" id="feedback"></div>

  <div class="guess-row">
    <input id="guessInput" type="text" placeholder="Your answer…" autocomplete="off" spellcheck="false" inputmode="text">
    <button class="btn btn-primary" id="guessBtn">Guess</button>
  </div>

  <div class="sub-row">
    <button class="btn" id="nextBtn">Next clue →</button>
    <button class="btn" id="giveUpBtn">Reveal answer</button>
  </div>
</div>

<div id="endPanel">
  <h2 id="endTitle"></h2>
  <div class="answer-reveal" id="answerReveal"></div>
  <p id="endSub"></p>
  <div class="score-big" id="scoreBig"></div>
  <div class="score-lbl">out of 5</div>
  <div class="stats-row">
    <div class="stat"><b id="stPlayed">0</b><span>Played</span></div>
    <div class="stat"><b id="stWins">0</b><span>Solved</span></div>
    <div class="stat"><b id="stAvg">—</b><span>Avg score</span></div>
  </div>
  <div class="cdown-lbl">Next mystery in</div>
  <div id="countdown">--:--:--</div>
  <div class="end-btns">
    <button class="btn btn-primary" id="copyBtn">Copy result</button>
  </div>
</div>

<div id="toast"></div>
<footer>Shroud — a daily mystery game</footer>

<script>
/* ========== 30 DAILY PUZZLES ========== */
const PUZZLES = [
  {answer:"EIFFEL TOWER",alts:["THE EIFFEL TOWER"],cat:"Landmark",
   clues:["I was built as a temporary entrance arch for a World's Fair","I stand over 300 metres tall and weigh around 10,000 tonnes","I was supposed to be demolished after just 20 years","About 7 million people visit me every year","I overlook the River Seine in Paris, France"]},

  {answer:"SHAKESPEARE",alts:["WILLIAM SHAKESPEARE"],cat:"Person",
   clues:["I was born in 1564 in a market town in England","I wrote both soaring tragedies and sharp comedies","I am often called the Bard","My plays include Hamlet, Macbeth and A Midsummer Night's Dream","I was born and died in Stratford-upon-Avon"]},

  {answer:"THE MOON",alts:["MOON"],cat:"Celestial Body",
   clues:["I sit roughly 384,000 km from Earth","I control the tides of every ocean on Earth","Twelve humans have walked on my surface","I have no atmosphere and no weather","I complete one full orbit of Earth every 27 days"]},

  {answer:"PIZZA",alts:[],cat:"Food",
   clues:["I was born in southern Italy in the 18th century","I am typically round, flat and baked at high heat","My most classic version is topped with tomato sauce and mozzarella","I come in hundreds of regional varieties around the world","I am one of the most consumed dishes on the planet"]},

  {answer:"THE GREAT WALL OF CHINA",alts:["GREAT WALL","THE GREAT WALL","GREAT WALL OF CHINA"],cat:"Landmark",
   clues:["Construction on me began over 2,000 years ago","I stretch thousands of miles across mountains, deserts and plains","I was built primarily to defend against invasions from the north","I am made of stone, brick, tamped earth and wood","I am China's most iconic landmark"]},

  {answer:"ALBERT EINSTEIN",alts:["EINSTEIN"],cat:"Person",
   clues:["I was born in Ulm, Germany in 1879","I struggled to find academic work after finishing university","I published four revolutionary papers in physics in a single year","I won the Nobel Prize in Physics in 1921","My equation E=mc² is perhaps the most famous in history"]},

  {answer:"THE AMAZON",alts:["AMAZON","AMAZON RAINFOREST","AMAZON RIVER"],cat:"Place",
   clues:["I cover around 5.5 million square kilometres","I am home to roughly 10% of all species on Earth","I produce about 20% of the world's oxygen","I am named after a mighty river that flows through me","I span nine countries in South America, with most of me in Brazil"]},

  {answer:"BEETHOVEN",alts:["LUDWIG VAN BEETHOVEN"],cat:"Person",
   clues:["I was born in Bonn, Germany in 1770","I composed nine symphonies over my lifetime","I became progressively deaf from my mid-twenties onwards","My Fifth Symphony opens with one of the most recognised motifs in classical music","My setting of Schiller's Ode to Joy is now the official anthem of the European Union"]},

  {answer:"HOUDINI",alts:["HARRY HOUDINI"],cat:"Person",
   clues:["I was born in Hungary in 1874 and emigrated to America as a child","I became world famous for escaping from handcuffs, chains and sealed containers","I was equally devoted to exposing fraudulent psychics and mediums","My stage name was borrowed from a celebrated French conjuror","I died on Halloween, 1926"]},

  {answer:"THE OLYMPIC GAMES",alts:["OLYMPICS","THE OLYMPICS","OLYMPIC GAMES"],cat:"Event",
   clues:["My origins lie in ancient Greece more than 2,700 years ago","I celebrate athletic competition across dozens of disciplines","I travel to a different host city every four years","My symbol is five interlocking coloured rings representing the world's continents","The modern version was revived in Athens in 1896"]},

  {answer:"CLEOPATRA",alts:[],cat:"Person",
   clues:["I was the last active ruler of the Ptolemaic Kingdom of Egypt","I was said to speak nine languages fluently","I formed powerful alliances with both Julius Caesar and Mark Antony","I was celebrated for my intelligence and political skill as much as her beauty","I died in 30 BC, ending three centuries of Ptolemaic rule"]},

  {answer:"THE INTERNET",alts:["INTERNET"],cat:"Invention",
   clues:["My origins lie in a US military research network built in the 1960s","I became accessible to the public in the late 1980s","The World Wide Web was invented on top of me in 1989","I now connect billions of devices across every country on Earth","You are using me right now"]},

  {answer:"MOUNT EVEREST",alts:["EVEREST","MT EVEREST"],cat:"Place",
   clues:["I am part of the Himalayan mountain range in Asia","I sit on the border between Nepal and Tibet","I was first summited on 29 May 1953","I grow by a few millimetres each year due to tectonic movement","At 8,849 metres, I am the highest point on Earth"]},

  {answer:"LEONARDO DA VINCI",alts:["DA VINCI","LEONARDO"],cat:"Person",
   clues:["I was born in Tuscany, Italy in 1452","I was simultaneously a painter, sculptor, architect, engineer and scientist","My notebooks contain thousands of observations and detailed sketched inventions","I painted The Last Supper","I also painted the most famous portrait in the world"]},

  {answer:"THE TITANIC",alts:["TITANIC","RMS TITANIC"],cat:"Ship",
   clues:["I was the largest ship ever built at the time of my launch","I was widely described — if informally — as unsinkable","I set sail on my maiden voyage from Southampton in April 1912","I sank after striking an iceberg in the North Atlantic","Over 1,500 people perished and my wreck was discovered in 1985"]},

  {answer:"SHERLOCK HOLMES",alts:["SHERLOCK"],cat:"Character",
   clues:["I am a fictional detective created in the late Victorian era","I live at 221B Baker Street, London","My closest companion is Dr John Watson","My arch-enemy is the criminal mastermind Professor Moriarty","My creator tried to kill me off — but public demand brought me back"]},

  {answer:"CHOCOLATE",alts:[],cat:"Food",
   clues:["I come from the seeds of the cacao tree, native to tropical regions","The Aztecs consumed me as a bitter ceremonial drink long before Europeans knew of me","Spanish explorers introduced me to Europe in the 16th century","I can be dark, milk or white depending on my composition","Switzerland and Belgium are particularly famed for their quality production of me"]},

  {answer:"MARIE CURIE",alts:["CURIE"],cat:"Person",
   clues:["I was born in Warsaw in 1867, then part of the Russian Empire","I moved to Paris to pursue a scientific education denied to women in my homeland","I became the first woman to win a Nobel Prize","I am the only person ever to win Nobel Prizes in two different scientific fields","I discovered the elements polonium and radium"]},

  {answer:"THE PYRAMIDS OF GIZA",alts:["PYRAMIDS","PYRAMIDS OF GIZA","THE PYRAMIDS","GREAT PYRAMID"],cat:"Landmark",
   clues:["I am among the Seven Wonders of the Ancient World","I was built as a royal burial site over 4,500 years ago","I stand on the edge of the desert near Cairo, Egypt","The largest of my structures was built for the Pharaoh Khufu","I am the only ancient wonder of the world still standing"]},

  {answer:"NELSON MANDELA",alts:["MANDELA"],cat:"Person",
   clues:["I was born in the Transkei region of South Africa in 1918","I was imprisoned for 27 years, largely on Robben Island","My release in 1990 marked a pivotal turning point in my country's history","I became my nation's first democratically elected president in 1994","I dedicated my life to ending the system of apartheid"]},

  {answer:"THE GREAT BARRIER REEF",alts:["GREAT BARRIER REEF"],cat:"Place",
   clues:["I am the largest coral reef system on Earth","I am home to thousands of species of fish, coral and marine life","I stretch over 2,300 kilometres along a continent's northeastern coastline","I can be seen from space","I lie off the coast of Queensland, Australia and face growing threats from climate change"]},

  {answer:"WALT DISNEY",alts:["DISNEY"],cat:"Person",
   clues:["I was born in Chicago in 1901","I co-founded one of the world's most recognisable entertainment companies","My first major animated character was a mouse","I opened theme parks on two continents during my lifetime","I hold the record for the most individual Academy Award wins in history"]},

  {answer:"THE MONA LISA",alts:["MONA LISA"],cat:"Artwork",
   clues:["I was painted in the early 16th century in Italy","I am surprisingly small — just 77 by 53 centimetres","I was stolen from my gallery in 1911 and not recovered for two years","I now hang behind bulletproof glass and receive millions of visitors a year","My subject's enigmatic smile has fascinated the world for five centuries"]},

  {answer:"MAHATMA GANDHI",alts:["GANDHI"],cat:"Person",
   clues:["I was born in Gujarat, India in 1869","I trained as a barrister in London","I first led campaigns against racial discrimination in South Africa","I returned to India to lead the independence movement against British rule","I was assassinated on 30 January 1948"]},

  {answer:"THE COLOSSEUM",alts:["COLOSSEUM","COLISEUM","THE COLISEUM"],cat:"Landmark",
   clues:["I am an ancient amphitheatre completed in 80 AD","I could hold between 50,000 and 80,000 spectators","Gladiatorial contests and public spectacles took place within my walls","I was partially damaged by earthquakes and used as a quarry for centuries","I stand at the very heart of Rome, Italy"]},

  {answer:"AGATHA CHRISTIE",alts:["CHRISTIE"],cat:"Person",
   clues:["I was born in Torquay, Devon in 1890","My work has been translated into more languages than almost any other author","I created the detectives Hercule Poirot and Miss Marple","I mysteriously disappeared for 11 days in December 1926, sparking a nationwide search","My play The Mousetrap has run continuously in London's West End since 1952"]},

  {answer:"THE TAJ MAHAL",alts:["TAJ MAHAL"],cat:"Landmark",
   clues:["I was commissioned in the 17th century by a Mughal emperor","I am built from gleaming white marble inlaid with precious stones","I was constructed as a monument to love — a mausoleum for a beloved wife","Millions of people travel to see me every year","I stand beside the Yamuna river in Agra, India"]},

  {answer:"CHARLES DARWIN",alts:["DARWIN"],cat:"Person",
   clues:["I was born in Shrewsbury, England in 1809","I spent five years voyaging around the world aboard HMS Beagle","I made critical observations among the Galápagos Islands","I published On the Origin of Species in 1859","My theory of evolution by natural selection explains the diversity of life on Earth"]},

  {answer:"THE NORTHERN LIGHTS",alts:["NORTHERN LIGHTS","AURORA BOREALIS","AURORA"],cat:"Natural Phenomenon",
   clues:["I occur near the Earth's polar regions","I am caused by charged particles from the sun interacting with Earth's atmosphere","My scientific name comes from the Roman goddess of dawn","I appear as shimmering curtains of green, pink, red and violet","I am best witnessed from Iceland, Norway, Canada and Alaska"]},

  {answer:"THE STATUE OF LIBERTY",alts:["STATUE OF LIBERTY"],cat:"Landmark",
   clues:["I was designed by a French sculptor and my steel framework by a celebrated engineer","I was a gift from France to the United States","I was completed and dedicated in 1886","I stand on an island in New York Harbor","I hold a torch aloft in my right hand and a tablet inscribed with a date in my left"]}
];

/* ========== CONFIG ========== */
const EPOCH = new Date(2026, 5, 13); // 13 June 2026 = Mystery #1

/* ========== STORAGE ========== */
const _mem = {};
const _hasSt = typeof window.storage !== "undefined";
async function sGet(k){ if(_hasSt){try{const r=await window.storage.get(k);return r?r.value:null;}catch(e){return null;}} return _mem[k]??null; }
async function sSet(k,v){ if(_hasSt){try{await window.storage.set(k,v);return;}catch(e){}} _mem[k]=v; }

/* ========== DATE ========== */
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dayIndex(){
  const t0=new Date();const ld=new Date(t0.getFullYear(),t0.getMonth(),t0.getDate());
  const e0=new Date(EPOCH.getFullYear(),EPOCH.getMonth(),EPOCH.getDate());
  const diff=Math.round((ld-e0)/86400000);
  return ((diff%30)+30)%30;
}

const DAY   = dayIndex();
const DATE  = todayKey();
const PUZ   = PUZZLES[DAY];
const K_RES = "shroud-result-"+DATE;
const K_PRG = "shroud-prog-"+DATE;
const K_ST  = "shroud-stats";

/* ========== STATE ========== */
let cluesShown=1, score=5, finished=false, won=false;

/* ========== DOM ========== */
const cluesList  = document.getElementById("cluesList");
const guessInput = document.getElementById("guessInput");
const guessBtn   = document.getElementById("guessBtn");
const nextBtn    = document.getElementById("nextBtn");
const giveUpBtn  = document.getElementById("giveUpBtn");
const feedbackEl = document.getElementById("feedback");

document.getElementById("dayBadge").textContent =
  "Mystery #"+(DAY+1)+" · "+new Date().toLocaleDateString(undefined,{day:"numeric",month:"short"});
document.getElementById("catLabel").textContent = PUZ.cat;

/* ========== RENDER ========== */
function renderGems(){
  const c=document.getElementById("gems"); c.innerHTML="";
  for(let i=0;i<5;i++){
    const g=document.createElement("div");
    g.className="gem"+(i>=score?" spent":"");
    c.appendChild(g);
  }
}

function renderClues(){
  cluesList.innerHTML="";
  for(let i=0;i<cluesShown;i++){
    const el=document.createElement("div");
    el.className="clue-card";
    el.innerHTML=`<div class="clue-num">${i+1}</div><div class="clue-text">${PUZ.clues[i]}</div>`;
    cluesList.appendChild(el);
  }
  for(let i=cluesShown;i<5;i++){
    const el=document.createElement("div");
    el.className="clue-pending";
    el.innerHTML=`<div class="clue-num">${i+1}</div><div class="dot-bar"></div>`;
    cluesList.appendChild(el);
  }
}

function updateControls(){
  nextBtn.disabled    = cluesShown>=5 || finished;
  giveUpBtn.disabled  = finished;
  guessBtn.disabled   = finished;
  guessInput.disabled = finished;
}

function setFeedback(msg, cls){
  feedbackEl.textContent=msg;
  feedbackEl.className="feedback"+(cls?" "+cls:"");
}

/* ========== CORE ACTIONS ========== */
function revealNext(){
  if(cluesShown>=5||finished) return;
  cluesShown++; score--;
  renderClues(); renderGems(); updateControls();
}

nextBtn.onclick = () => {
  if(finished) return;
  revealNext();
  setFeedback("Clue "+cluesShown+" revealed — score now "+score+"/5","");
  saveProgress();
};

giveUpBtn.onclick = async () => {
  if(finished) return;
  cluesShown=5; score=0; won=false; finished=true;
  renderClues(); renderGems(); updateControls();
  setFeedback("","");
  await finishGame(false);
};

guessInput.addEventListener("keydown", e=>{ if(e.key==="Enter") guessBtn.click(); });

guessBtn.onclick = async () => {
  if(finished) return;
  const raw=guessInput.value.trim(); if(!raw) return;
  const norm=raw.toUpperCase().replace(/[^A-Z\s]/g,"").replace(/\s+/g," ").trim();
  const valid=[PUZ.answer,...PUZ.alts].map(a=>a.toUpperCase().replace(/[^A-Z\s]/g,"").replace(/\s+/g," ").trim());

  if(valid.includes(norm)){
    won=true; finished=true;
    guessInput.classList.add("flash-right");
    setFeedback("Correct! ✨","good");
    updateControls();
    await saveProgress();
    setTimeout(()=>finishGame(true), 700);
  } else {
    guessInput.classList.add("flash-wrong");
    setTimeout(()=>{guessInput.classList.remove("flash-wrong"); guessInput.value="";},380);
    if(cluesShown>=5){
      score=0; won=false; finished=true;
      setFeedback("Not quite — game over!","bad");
      updateControls();
      await saveProgress();
      setTimeout(()=>finishGame(false), 700);
    } else {
      setFeedback("Not quite — next clue revealed","bad");
      revealNext();
      await saveProgress();
    }
  }
};

/* ========== PERSISTENCE ========== */
async function saveProgress(){
  await sSet(K_PRG, JSON.stringify({cluesShown,score,finished,won}));
}

async function finishGame(didWin){
  await saveProgress();
  const stats=await loadStats();
  stats.played++;
  if(didWin){
    stats.wins++;
    stats.totalScore=(stats.totalScore||0)+score;
    stats.streak=(stats.lastWin&&isYesterday(stats.lastWin))?stats.streak+1:1;
    stats.lastWin=DATE;
  } else {
    stats.streak=0;
  }
  await sSet(K_ST, JSON.stringify(stats));
  await sSet(K_RES, JSON.stringify({won:didWin,score,cluesShown,date:DATE,day:DAY}));
  showEnd(didWin, stats);
}

async function loadStats(){
  const r=await sGet(K_ST);
  try{ return r?JSON.parse(r):{played:0,wins:0,streak:0,lastWin:null,totalScore:0}; }
  catch(e){ return {played:0,wins:0,streak:0,lastWin:null,totalScore:0}; }
}

function isYesterday(ds){
  const d=new Date(ds+"T00:00:00");
  const y=new Date(); y.setDate(y.getDate()-1);
  return d.getFullYear()===y.getFullYear()&&d.getMonth()===y.getMonth()&&d.getDate()===y.getDate();
}

/* ========== END SCREEN ========== */
const SCORE_ICON=["💀","🌑","🌒","🌓","🌔","🌕"];
const SCORE_GEMS=s=>"🟣".repeat(s)+"⬛".repeat(5-s);

function showEnd(didWin, stats){
  document.getElementById("mainWrap").style.display="none";
  const p=document.getElementById("endPanel"); p.style.display="block";

  const titles={
    5:"First clue! 🔮",4:"Sharp mind! 🔮",3:"Well solved!",2:"Got there!",1:"Just in time!",0:"The shroud holds 🌫️"
  };
  document.getElementById("endTitle").textContent = didWin ? (titles[score]||"Solved!") : titles[0];
  document.getElementById("answerReveal").textContent = PUZ.answer;
  document.getElementById("endSub").textContent = didWin
    ? "You solved it using "+cluesShown+" clue"+(cluesShown===1?"":"s")+" — a score of "+score+" out of 5."
    : "Better luck tomorrow — the answer was revealed above.";
  document.getElementById("scoreBig").textContent = SCORE_ICON[score]+" "+score;

  document.getElementById("stPlayed").textContent = stats.played;
  document.getElementById("stWins").textContent   = stats.wins;
  document.getElementById("stAvg").textContent    = stats.wins>0 ? (stats.totalScore/stats.wins).toFixed(1) : "—";

  startCountdown();
}

function startCountdown(){
  const el=document.getElementById("countdown");
  function tick(){
    const now=new Date();
    const mid=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
    let s=Math.max(0,Math.floor((mid-now)/1000));
    el.textContent=String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor(s%3600/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
    if(s===0) location.reload();
  }
  tick(); setInterval(tick,1000);
}

document.getElementById("copyBtn").onclick=()=>{
  const txt="Shroud #"+(DAY+1)+" — "+(won?score:0)+"/5\n"+SCORE_GEMS(won?score:0);
  const ta=document.createElement("textarea");
  ta.value=txt; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); toast("Copied to clipboard!"); }
  catch(e){ toast("Couldn't copy"); }
  document.body.removeChild(ta);
};

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1900);
}

/* ========== INIT ========== */
(async function init(){
  const doneRaw=await sGet(K_RES);
  if(doneRaw){
    try{
      const r=JSON.parse(doneRaw);
      cluesShown=r.cluesShown||5; score=r.score||0; won=r.won; finished=true;
      renderClues(); renderGems(); updateControls();
      const stats=await loadStats();
      showEnd(r.won, stats);
      document.getElementById("endSub").textContent=
        (r.won?"You solved":"You played")+" today's mystery. Come back tomorrow!";
      return;
    }catch(e){}
  }
  const progRaw=await sGet(K_PRG);
  if(progRaw){
    try{
      const p=JSON.parse(progRaw);
      cluesShown=p.cluesShown||1; score=p.score??5;
      finished=p.finished||false; won=p.won||false;
      if(finished){ renderClues(); renderGems(); updateControls(); const stats=await loadStats(); showEnd(won,stats); return; }
    }catch(e){}
  }
  renderClues(); renderGems(); updateControls();
})();
</script>
